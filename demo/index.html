function srcFromUrl(u) { for (const [re, name] of SRC_MAP) if (re.test(u)) return name; try { return new URL(u).hostname.replace(/^www\./, "").split(".")[0].replace(/^\w/, (c) => c.toUpperCase()); } catch (e) { return "Web"; } }
function titleFromUrl(u) {
  let path; try { path = new URL(u).pathname; } catch (e) { path = u; }
  const segs = path.split("/").filter(Boolean);
  let slug = segs.reverse().find((s) => /[a-z].*[a-z].*[a-z]/i.test(s)) || segs[0] || "";
  slug = slug.replace(/\.(html?|pdf|php)$/i, "");
  if (/^(s\d{5,}|10\.\d{4,}|\d{4}\.\d{2})/.test(slug) || /^\d+$/.test(slug)) return null; // DOI / id-like
  slug = slug.replace(/[-_]+/g, " ").replace(/\b(en|news|home|article|articles|blog|story|p)\b/gi, " ").replace(/\s+/g, " ").trim();
  if (slug.length < 8) return null;
  return slug.charAt(0).toUpperCase() + slug.slice(1);
}

function inferFirmographics(t) { t = t.toLowerCase(); return { hasBiologicsPipeline: /biologic|antibody|therapeutic/.test(t), hasProteinEngTeam: /protein eng|antibody eng|enzyme eng|protein science|principal scientist/.test(t), hasStructuralBiology: /structural bio|cryo-em|crystallog/.test(t), activeProgramsPerYear: 2, rdBudgetTier: "mid" }; }

const state = { leads: [], view: "pipeline", selectedId: null, sigComp: "All", sigRel: false, scout: SCOUT_SEED.map((x) => ({ ...x })), scoutWatch: { Competitor: true, Funding: true, Launch: true, Research: true, Industry: true }, skin: "scala" };

function buildLeads() {
  const out = [];
  for (const a of ACCOUNTS) {
    const account = { name: a.name, segment: a.segment, hasBiologicsPipeline: a.hasBiologicsPipeline, hasProteinEngTeam: a.hasProteinEngTeam, hasStructuralBiology: a.hasStructuralBiology, activeProgramsPerYear: a.activeProgramsPerYear, rdBudgetTier: a.rdBudgetTier };
    for (const L of a.leads) {
      const lead = { id: uid("lead"), fullName: L.fullName, title: L.title, role: L.role, seniority: L.seniority, location: L.location, linkedinUrl: "https://www.linkedin.com/in/example", account, stage: L.stage, warmPath: L.warmPath || null, aiGenerated: false,
        signals: L.signals.map((s) => ({ id: uid("sig"), kind: s.kind, strength: s.strength, summary: s.summary, source: s.source, occurredAt: daysAgo(s.d) })), messages: [] };
      rescore(lead); out.push(lead);

}

/* ---------- helpers ---------- */
const tone = (p) => (p >= 60 ? "hot" : p >= 40 ? "warm" : "cool");

const CIRC = 2 * Math.PI * 34;

function analytics() {
  const ls = state.leads, total = ls.length; const idx = (s) => STAGES.indexOf(s);
  const cumulative = STAGES.map((st) => ls.filter((l) => idx(l.stage) >= idx(st)).length);
  const funnel = STAGES.map((st, i) => ({ label: STAGE_LABELS[st], count: cumulative[i], conv: i === 0 ? null : cumulative[i - 1] ? Math.round((cumulative[i] / cumulative[i - 1]) * 100) : 0 }));
  const DEMO = { connection: 52, content_engagement: 41, competitor_engagement: 34, hiring: 28, job_change: 25, funding: 22, publication: 18 };
  const kc = {}; ls.forEach((l) => l.signals.forEach((s) => { (kc[s.kind] = kc[s.kind] || new Set()).add(l.id); }));
  const bySignal = Object.keys(kc).map((k) => ({ kind: k, label: SIGNAL_LABELS[k] || k, leads: kc[k].size, rate: DEMO[k] || 20 })).sort((a, b) => b.rate - a.rate);
  const sow = (d) => { const x = new Date(d); x.setHours(0, 0, 0, 0); x.setDate(x.getDate() - x.getDay()); return x; };
  const weeks = []; for (let i = 7; i >= 0; i--) { const st = sow(new Date(Date.now() - i * 7 * DAY)); weeks.push({ t: st.getTime(), label: st.toLocaleDateString("en-US", { month: "short", day: "numeric" }), signals: 0 }); }
  ls.forEach((l) => l.signals.forEach((s) => { const w = weeks.find((x) => x.t === sow(new Date(s.occurredAt)).getTime()); if (w) w.signals++; }));
  const avg = total ? Math.round(ls.reduce((s, l) => s + l.priority, 0) / total) : 0;
  const warmShare = total ? Math.round((ls.filter((l) => l.warmPath || l.warmth > 0).length / total) * 100) : 0;
  return { total, avg, warmShare, meetings: ls.filter((l) => l.stage === "meeting").length, funnel, bySignal, trend: weeks };
}

/* ---------- actions ---------- */
let toastTimer;
function toast(msg) { const r = document.getElementById("toast-root"); r.innerHTML = `<div class="toast">${esc(msg)}</div>`; clearTimeout(toastTimer); toastTimer = setTimeout(() => (r.innerHTML = ""), 3200); }
function copyText(t) { navigator.clipboard && navigator.clipboard.writeText(t); toast("Copied to clipboard"); }
function setStage(l, stage) { l.stage = stage; render(); toast("Moved to " + STAGE_LABELS[stage]); }
function draftNext(l) { const used = new Set(l.messages.map((m) => m.step)); const next = SEQUENCE.find((s) => !used.has(s.step)); if (!next) return; l.messages.push({ id: uid("msg"), channel: next.channel, step: next.step, body: composeBody(next.step, l), status: "draft" }); render(); toast("Drafted next step"); }
function markMsg(l, mid, status) { const m = l.messages.find((x) => x.id === mid); if (!m) return; m.status = status; if (status === "sent" && (l.stage === "new" || l.stage === "qualified")) l.stage = "contacted"; if (status === "replied" && l.stage !== "meeting") l.stage = "replied"; render(); toast(status === "sent" ? "Marked sent · stage → Contacted" : "Marked replied · stage → Replied"); }
function competitorFromSource(src) {
  if (/Cradle/i.test(src)) return "Cradle";
  if (/Absci/i.test(src)) return "Absci";
  if (/LabGenius/i.test(src)) return "LabGenius";
  if (/careers/i.test(src)) return "Job market";
  if (/press/i.test(src)) return "Newswire";
  return "LinkedIn";
}
function runScan() {
  const picked = []; for (let i = 0; i < 4; i++) picked.push(SCAN_POOL[(scanCursor + i) % SCAN_POOL.length]); scanCursor = (scanCursor + 4) % SCAN_POOL.length;
  let newLeads = 0, added = 0, relevant = 0;
  const fresh = [];
  for (const e of picked) {
    const isBuyer = !NOISE.test(e.headline) && (TECH2.test(e.headline) || ECON2.test(e.headline));
    let outcome, lead;
    if (isBuyer) {
      relevant++;
      lead = state.leads.find((l) => l.fullName === e.name);
      if (!lead) { const account = Object.assign({ name: e.company, segment: "Discovered via signal" }, inferFirmographics(e.headline + " " + e.company)); lead = { id: uid("lead"), fullName: e.name, title: e.headline.split(/[|@]/)[0].trim(), role: e.headline.split(/[|@]/)[0].trim(), seniority: seniorityOf(e.headline), location: null, linkedinUrl: "https://www.linkedin.com/in/example", account, stage: "new", warmPath: null, aiGenerated: false, signals: [], messages: [] }; state.leads.push(lead); newLeads++; outcome = "New lead: " + e.name; }
      else outcome = "Updated lead: " + e.name;
      if (!lead.signals.some((s) => s.summary === e.context)) { lead.signals.unshift({ id: uid("sig"), kind: e.kind, strength: STRENGTH_BY_KIND[e.kind] || 55, summary: e.context, source: e.source, occurredAt: daysAgo(0) }); added++; }
      rescore(lead);
    } else {
      outcome = "Filtered — not an ICP buyer";
    }
    const comp = competitorFromSource(e.source);
    fresh.push({ d: 0.02, competitor: comp, topic: SIGNAL_LABELS[e.kind] || e.kind, author: comp, authorTitle: e.source, excerpt: e.context, type: e.kind === "hiring" ? "job" : "comment", who: e.name, whoHeadline: e.headline, comment: isBuyer && e.kind !== "hiring" ? "(engaged — profile matched against the ICP)" : null, kind: e.kind, strength: STRENGTH_BY_KIND[e.kind] || 55, relevant: isBuyer, outcome });
  }
  MARKET_SIGNALS.unshift(...fresh);
  state.view = "signals";
  render(); toast(`Scan: ${relevant}/4 relevant · +${newLeads} leads, ${added} signals · surfaced in the Signals feed`);
}
function exportCsv() {
  const cell = (v) => { const s = v == null ? "" : String(v); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
  const H = ["Name", "Title", "Role", "Seniority", "Company", "Segment", "Location", "Fit", "Intent", "Warmth", "Priority", "Stage", "Warm path", "Top signal", "LinkedIn"];
  const rows = byPriority().map((l) => [l.fullName, l.title, l.role, l.seniority, l.account.name, l.account.segment, l.location, l.fit, l.intent, l.warmth, l.priority, l.stage, l.warmPath, l.signals[0] ? l.signals[0].summary : "", l.linkedinUrl].map(cell).join(","));
  const csv = [H.join(","), ...rows].join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8" }); const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "leadscope-pipeline.csv"; a.click(); URL.revokeObjectURL(url); toast("Exported CSV");
}

/* ---------- events ---------- */
document.addEventListener("click", (ev) => {
  const t = ev.target.closest("[data-act],[data-view],[data-open],[data-sigcomp],[data-sigrel],[data-scoutwatch],[data-skin-pick]"); if (!t) return;
  if (t.hasAttribute("data-skin-pick")) { state.skin = t.getAttribute("data-skin-pick"); document.documentElement.setAttribute("data-skin", state.skin); try { localStorage.setItem("leadscope-skin", state.skin); } catch (e) {} render(); return; }
  if (t.hasAttribute("data-sigcomp")) { state.sigComp = t.getAttribute("data-sigcomp"); render(); return; }
  if (t.hasAttribute("data-sigrel")) { state.sigRel = !state.sigRel; render(); return; }
  if (t.hasAttribute("data-scoutwatch")) { const c = t.getAttribute("data-scoutwatch"); state.scoutWatch[c] = !state.scoutWatch[c]; render(); return; }
  if (t.dataset.view) { state.view = t.dataset.view; render(); return; }
  if (t.dataset.open) { state.selectedId = t.dataset.open; render(); return; }
  const act = t.dataset.act; const l = state.leads.find((x) => x.id === state.selectedId);
  if (act === "close") { state.selectedId = null; render(); }
  else if (act === "scan") runScan();
  else if (act === "scout-run") runScoutNow();
  else if (act === "scout-add") addScoutArticle();
  else if (act === "export") exportCsv();
  else if (act === "crm") toast("Synced " + state.leads.length + " leads → HubSpot (demo)");
  else if (act === "copy") copyText(t.dataset.body || "");
  else if (act === "draft" && l) draftNext(l);
  else if (act === "msg" && l) markMsg(l, t.dataset.mid, t.dataset.status);
});
document.addEventListener("change", (ev) => { const t = ev.target.closest('[data-act="stage"]'); if (!t) return; const l = state.leads.find((x) => x.id === state.selectedId); if (l) setStage(l, t.value); });
document.addEventListener("keydown", (ev) => { if (ev.key === "Enter" && ev.target.id === "scout-url") { ev.preventDefault(); addScoutArticle(); } });

buildLeads(); render();
</script>
